server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # Note: Ensure the backend container is named 'backend' and runs on port 3000
    # OR set VITE_API_URL via environment if calling from client side
}
